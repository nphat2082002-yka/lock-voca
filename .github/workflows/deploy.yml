name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build:web

      - name: Show generated files
        run: |
          ls -la web-build
          find web-build -maxdepth 2 -type f | sort | head -50
          echo "--- index.html preview ---"
          sed -n '1,80p' web-build/index.html

      - name: Publish to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web-build
          branch: gh-pages
          clean: true
