name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios

      - name: Build Simulator APP via xcodebuild
        run: |
          cd ios
          # Tìm chính xác tên Workspace của dự án để tránh lỗi đọc sai tên scheme
          WORKSPACE_NAME=$(ls -d *.xcworkspace | head -n 1)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          
          echo "Building Workspace: $WORKSPACE_NAME with Scheme: $SCHEME_NAME"
          
          # Đổi sang build dạngiphonesimulator để lách qua bước check chứng chỉ của Apple
          xcodebuild -workspace "$WORKSPACE_NAME" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     BUILD_DIR=../build

      - name: Package APP into IPA
        run: |
          # Tạo cấu trúc thư mục Payload tiêu chuẩn cho file .ipa
          mkdir -p Payload
          # Tìm file .app vừa build xong và sao chép vào Payload
          APP_PATH=$(find build -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          # Nén thành file .ipa
          zip -r app-debug.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: app-debug.ipa