name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios

      - name: Build iOS App via xcodebuild
        run: |
          cd ios
          
          # Tìm chính xác tên file .xcworkspace
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          echo "Found Workspace: $WORKSPACE"
          
          # Tự động quét và lấy tên Scheme đầu tiên trong danh sách của Xcode
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | awk '/Schemes:/{flag=1; next} /^$/{flag=0} flag' | sed 's/^[ \t]*//' | head -n 1)
          echo "Dynamically detected Scheme: '$SCHEME'"
          
          # Chạy lệnh build với Scheme vừa tìm được
          xcodebuild -workspace "$WORKSPACE" \
                     -scheme "$SCHEME" \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     -derivedDataPath ../build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Package APP into IPA
        run: |
          mkdir -p Payload
          # Tìm bất kỳ file .app nào xuất hiện trong thư mục build để đóng gói
          APP_PATH=$(find build/Build/Products -name "*.app" -type d | head -n 1)
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r app-debug.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: app-debug.ipa