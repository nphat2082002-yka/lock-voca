name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS Project
        run: npx expo prebuild --platform ios

      - name: Build iOS App via xcodebuild
        run: |
          cd ios
          xcodebuild -workspace lockvocab.xcworkspace \
                     -scheme lockvocab \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     BUILD_DIR=../build

      - name: Package APP into IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build -name "lockvocab.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r app-debug.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: app-debug.ipa